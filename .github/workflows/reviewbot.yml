name: reviewbot
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions: {}                  # deny by default

jobs:
  review:
    name: reviewbot review
    # Public repo: only run when the PR head is in this same repo (secrets are available).
    # Size guard: skip giant upstream-sync PRs (300+-commit merges are poor, expensive review targets).
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.commits < 50 &&
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      checks: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify Claude Code
        run: claude --version

      - name: Run reviewbot
        uses: shuv1337/shuvbot@v0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Upload reviewbot artifacts
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: reviewbot
          path: ${{ runner.temp }}/reviewbot
          if-no-files-found: warn
